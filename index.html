<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Food Are You?</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container py-5">
    <h1 class="text-center mb-4">What Food Are You?</h1>
    <p class="text-center mb-5">Answer the questions and find out your food personality.</p>

    <div class="question-block card p-4 mb-4" data-question="q1">
      <h3>1. What sounds best for dinner?</h3>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="steak">Grilled and hearty</button>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="pizza">Cheesy and easy</button>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="tacos">Spicy and loaded</button>
    </div>

    <div class="question-block card p-4 mb-4" data-question="q2">
      <h3>2. Pick a weekend plan:</h3>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="steak">Cook outside</button>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="pizza">Hang with friends</button>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="tacos">Go out and have fun</button>
    </div>

    <div class="question-block card p-4 mb-4" data-question="q3">
      <h3>3. Pick a flavor:</h3>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="steak">Smoky</button>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="pizza">Savory</button>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="tacos">Spicy</button>
    </div>

    <div class="question-block card p-4 mb-4" data-question="q4">
      <h3>4. Pick a side:</h3>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="steak">Baked potato</button>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="pizza">Breadsticks</button>
      <button class="answer-btn btn btn-outline-primary m-2" data-answer="tacos">Chips and salsa</button>
    </div>

    <div class="text-center">
      <button id="show-result-btn" class="btn btn-success btn-lg mt-3">Give Me the Results</button>
    </div>

    <div id="result-container" class="mt-5 p-4 border rounded text-center">
      Your result will appear here.
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
