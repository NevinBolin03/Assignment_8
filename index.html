<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Food Are You?</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-5">
  <h1 class="text-center mb-4">What Food Are You?</h1>
  <p class="text-center mb-5">Answer the questions to find out your food personality.</p>

  <!-- Question 1 -->
  <div class="question-block card p-3 mb-3" data-question="q1">
    <h4>1. Pick a meal style</h4>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="steak">Grilled</button>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="pizza">Cheesy</button>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="tacos">Spicy</button>
  </div>

  <!-- Question 2 -->
  <div class="question-block card p-3 mb-3" data-question="q2">
    <h4>2. Weekend plan?</h4>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="steak">Cook outside</button>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="pizza">Hang out</button>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="tacos">Go out</button>
  </div>

  <!-- Question 3 -->
  <div class="question-block card p-3 mb-3" data-question="q3">
    <h4>3. Favorite flavor?</h4>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="steak">Smoky</button>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="pizza">Savory</button>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="tacos">Spicy</button>
  </div>

  <!-- Question 4 -->
  <div class="question-block card p-3 mb-3" data-question="q4">
    <h4>4. Pick a side</h4>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="steak">Potato</button>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="pizza">Breadsticks</button>
    <button class="answer-btn btn btn-outline-primary m-1" data-answer="tacos">Chips</button>
  </div>

  <!-- Result Button -->
  <div class="text-center">
    <button id="result-btn" class="btn btn-success mt-3">Get Result</button>
  </div>

  <!-- Result Display -->
  <div id="result" class="mt-4 text-center fs-4 fw-bold"></div>

</div>

<!-- JS LINK (VERY IMPORTANT) -->
<script src="script.js"></script>

</body>
</html>
